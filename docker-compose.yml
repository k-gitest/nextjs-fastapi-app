services:
  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
      target: builder # 開発時はコンパイラ等が入ったbuilder層を使用
    container_name: api-dev
    volumes:
      - .:/workspace:cached
    working_dir: /workspace/apps/api
    env_file:
      - ./apps/api/.env
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/workspace/apps
    # uv sync で同期してから起動
    command: >
      sh -c "uv sync && uv run uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    restart: unless-stopped  # OOMで落ちても再起動
    ports:
      - "8000:8000"

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
      target: builder
    container_name: web-dev
    volumes:
      - .:/workspace:cached
      - /workspace/node_modules
      - /workspace/apps/web/node_modules
      - /workspace/packages/db/node_modules
    working_dir: /workspace/apps/web
    environment:
      - NODE_ENV=development
      - NODE_OPTIONS=--max-old-space-size=4096
    restart: unless-stopped
    # turbo または npm で起動
    # command: sh -c "npm install && npm run dev -- -p 3000"
    # 開発時はルートでinstall済みを前提にdevを起動
    command: sh -c "npm run dev -- -p 3000"
    ports:
      - "3000:3000"

  worker:
    build:
      context: .
      dockerfile: ./apps/worker/Dockerfile
      target: builder
    container_name: worker-dev
    volumes:
      - .:/workspace:cached
      - /workspace/node_modules
      - /workspace/packages/db/node_modules
    working_dir: /workspace/apps/worker
    environment:
      - NODE_ENV=development
    env_file:
      - ./apps/worker/.env
    restart: unless-stopped
    command: sh -c "npm install && npm run dev"
    depends_on:
      - api

networks:
  default:
    name: monorepo_network